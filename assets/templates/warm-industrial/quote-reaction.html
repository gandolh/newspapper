<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@700;800&family=Manrope:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 1080px;
      height: 1080px;
      background-color: {{colors.surface}};
      background-image: 
        linear-gradient(to right, rgba(27, 28, 28, 0.05) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(27, 28, 28, 0.05) 1px, transparent 1px);
      background-size: 32px 32px;
      color: {{colors.on-surface}};
      font-family: {{typography.body-md.fontFamily}}, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 100px;
      border: 20px solid {{colors.on-surface}};
    }
    
    .container {
      width: 100%;
      background-color: {{colors.surface-container-highest}};
      padding: 80px;
      border: 4px solid {{colors.on-surface}};
      position: relative;
    }
    
    .reaction {
      position: absolute;
      top: -30px;
      left: 80px;
      font-family: {{typography.label-bold.fontFamily}}, sans-serif;
      font-size: 24px;
      font-weight: 800;
      color: {{colors.on-primary}};
      background-color: {{colors.primary}};
      padding: 12px 24px;
      border: 4px solid {{colors.on-surface}};
      display: inline-block;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      box-shadow: 8px 8px 0px {{colors.on-surface}};
    }
    
    .quote-text {
      font-family: {{typography.headline-md.fontFamily}}, sans-serif;
      font-size: 48px;
      font-weight: 700;
      line-height: 1.3;
      color: {{colors.on-surface}};
      margin-top: 20px;
      margin-bottom: 48px;
    }
    
    .attribution {
      font-family: {{typography.label-bold.fontFamily}}, sans-serif;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 0.1em;
      color: {{colors.on-surface-variant}};
      text-transform: uppercase;
      border-top: 4px solid {{colors.outline}};
      padding-top: 24px;
      display: inline-block;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="reaction">Wait, what?</div>
    <div class="quote-text">{{text}}</div>
    <div class="attribution">{{attribution}}</div>
  </div>
</body>
</html>
