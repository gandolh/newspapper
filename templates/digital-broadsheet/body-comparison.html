<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:wght@400;600;700&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 1080px;
      height: 1080px;
      background-color: {{colors.surface-container}};
      color: {{colors.on-surface}};
      font-family: {{typography.body-md.fontFamily}}, serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 100px;
    }
    
    .container {
      width: 100%;
      background-color: {{colors.surface}};
      border: 2px solid {{colors.outline}};
      padding: 80px;
      box-shadow: 20px 20px 0px {{colors.primary}};
    }
    
    .header {
      margin-bottom: 48px;
      text-align: center;
      border-bottom: 2px dashed {{colors.outline}};
      padding-bottom: 24px;
    }
    
    .meta {
      font-family: {{typography.meta-technical.fontFamily}}, monospace;
      font-size: 20px;
      font-weight: 500;
      letter-spacing: 0.15em;
      color: {{colors.primary}};
      text-transform: uppercase;
    }
    
    .body-text {
      font-family: {{typography.body-lg.fontFamily}}, serif;
      font-size: 40px;
      font-weight: 500;
      line-height: 1.5;
      color: {{colors.on-surface}};
      white-space: pre-wrap;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="meta">NEWSPAPPER</div>
    </div>
    <div class="body-text">{{text}}</div>
  </div>
</body>
</html>
