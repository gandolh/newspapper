<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:wght@400;600;700&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 1080px;
      height: 1080px;
      background-color: {{colors.surface}};
      color: {{colors.on-surface}};
      font-family: {{typography.body-md.fontFamily}}, serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: {{spacing.margin}};
    }
    
    .container {
      width: 100%;
      max-width: 900px;
      border: {{shapes.borderWidth}} solid {{colors.outline}};
      background-color: {{colors.surface-container}};
    }
    
    .image-container {
      width: 100%;
      height: 600px;
      background-color: {{colors.surface-dim}};
      border-bottom: {{shapes.borderWidth}} solid {{colors.outline}};
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .image-placeholder {
      font-family: {{typography.meta-technical.fontFamily}}, monospace;
      font-size: {{typography.meta-technical.fontSize}};
      color: {{colors.on-surface-variant}};
      text-transform: uppercase;
      letter-spacing: {{typography.meta-technical.letterSpacing}};
    }
    
    .caption {
      padding: {{spacing.gutter}};
    }
    
    .caption-text {
      font-family: {{typography.body-md.fontFamily}}, serif;
      font-size: {{typography.body-md.fontSize}};
      line-height: {{typography.body-md.lineHeight}};
      color: {{colors.on-surface}};
      margin-bottom: 12px;
    }
    
    .meta {
      font-family: {{typography.label-sm.fontFamily}}, monospace;
      font-size: {{typography.label-sm.fontSize}};
      color: {{colors.on-surface-variant}};
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="image-container">
      <div class="image-placeholder">[IMAGE]</div>
    </div>
    <div class="caption">
      <div class="caption-text">{{text}}</div>
      <div class="meta">
        <span>NEWSPAPPER</span>
        <span>{{slideNumber}}/{{totalSlides}}</span>
      </div>
    </div>
  </div>
</body>
</html>
