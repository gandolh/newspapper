<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:wght@400;600;700&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 1080px;
      height: 1080px;
      background-color: {{colors.surface}};
      color: {{colors.on-surface}};
      font-family: {{typography.body-md.fontFamily}}, serif;
      display: flex;
      flex-direction: column;
      padding: 0;
    }
    
    .image-container {
      width: 100%;
      height: 640px;
      background-color: {{colors.surface-dim}};
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .image-placeholder {
      font-family: {{typography.meta-technical.fontFamily}}, monospace;
      font-size: 24px;
      color: {{colors.on-surface-variant}};
      text-transform: uppercase;
      letter-spacing: 0.2em;
      opacity: 0.5;
    }
    
    .caption-container {
      flex: 1;
      padding: 60px 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      border-top: 8px solid {{colors.primary}};
    }
    
    .caption-text {
      font-family: {{typography.body-lg.fontFamily}}, serif;
      font-size: 38px;
      line-height: 1.4;
      color: {{colors.on-surface}};
      margin-bottom: 24px;
    }
    
    .meta {
      font-family: {{typography.meta-technical.fontFamily}}, monospace;
      font-size: 16px;
      font-weight: 500;
      color: {{colors.on-surface-variant}};
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="image-container">
    <div class="image-placeholder">[IMAGE]</div>
  </div>
  <div class="caption-container">
    <div class="caption-text">{{text}}</div>
    <div class="meta">NEWSPAPPER</div>
  </div>
</body>
</html>
