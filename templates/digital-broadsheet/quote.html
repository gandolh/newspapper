<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:wght@400;600;700&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 1080px;
      height: 1080px;
      background-color: {{colors.surface}};
      color: {{colors.on-surface}};
      font-family: {{typography.body-md.fontFamily}}, serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: {{spacing.margin}};
    }
    
    .container {
      width: 100%;
      max-width: 900px;
      border: {{shapes.borderWidth}} solid {{colors.outline}};
      padding: 48px;
      background-color: {{colors.surface-container}};
      position: relative;
    }
    
    .quote-mark {
      font-family: {{typography.display-lg.fontFamily}}, serif;
      font-size: 120px;
      font-weight: {{typography.display-lg.fontWeight}};
      color: {{colors.primary-container}};
      line-height: 1;
      margin-bottom: 16px;
    }
    
    .quote-text {
      font-family: {{typography.headline-md.fontFamily}}, serif;
      font-size: {{typography.headline-md.fontSize}};
      font-weight: {{typography.headline-md.fontWeight}};
      line-height: {{typography.headline-md.lineHeight}};
      color: {{colors.on-surface}};
      margin-bottom: {{spacing.gutter}};
      font-style: italic;
    }
    
    .attribution {
      font-family: {{typography.meta-technical.fontFamily}}, monospace;
      font-size: {{typography.meta-technical.fontSize}};
      font-weight: {{typography.meta-technical.fontWeight}};
      letter-spacing: {{typography.meta-technical.letterSpacing}};
      color: {{colors.on-surface-variant}};
      text-transform: uppercase;
      border-top: {{shapes.borderWidth}} solid {{colors.outline-variant}};
      padding-top: 16px;
    }
    
    .slide-number {
      font-family: {{typography.label-sm.fontFamily}}, monospace;
      font-size: {{typography.label-sm.fontSize}};
      color: {{colors.on-surface-variant}};
      position: absolute;
      bottom: {{spacing.gutter}};
      right: {{spacing.gutter}};
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="quote-mark">"</div>
    <div class="quote-text">{{text}}</div>
    <div class="attribution">— {{attribution}}</div>
    <div class="slide-number">{{slideNumber}}/{{totalSlides}}</div>
  </div>
</body>
</html>
