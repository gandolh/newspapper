<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:wght@400;600;700&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 1080px;
      height: 1080px;
      background-color: {{colors.surface}};
      color: {{colors.on-surface}};
      font-family: {{typography.body-md.fontFamily}}, serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 100px;
    }
    
    .container {
      width: 100%;
      max-width: 880px;
      text-align: center;
    }
    
    .quote-mark {
      font-family: {{typography.display-lg.fontFamily}}, serif;
      font-size: 160px;
      color: {{colors.primary}};
      line-height: 1;
      margin-bottom: -20px;
      opacity: 0.2;
    }
    
    .quote-text {
      font-family: {{typography.headline-md.fontFamily}}, serif;
      font-size: 56px;
      font-weight: 600;
      line-height: 1.2;
      color: {{colors.on-surface}};
      margin-bottom: 48px;
      font-style: italic;
    }
    
    .attribution {
      font-family: {{typography.meta-technical.fontFamily}}, monospace;
      font-size: 20px;
      font-weight: 500;
      letter-spacing: 0.1em;
      color: {{colors.on-surface-variant}};
      text-transform: uppercase;
      display: inline-block;
      border-top: 2px solid {{colors.outline-variant}};
      padding-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="quote-mark">“</div>
    <div class="quote-text">{{text}}</div>
    <div class="attribution">{{attribution}}</div>
  </div>
</body>
</html>
