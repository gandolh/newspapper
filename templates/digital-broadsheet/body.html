<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:wght@400;600;700&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 1080px;
      height: 1080px;
      background-color: {{colors.surface}};
      color: {{colors.on-surface}};
      font-family: {{typography.body-md.fontFamily}}, serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: {{spacing.margin}};
    }
    
    .container {
      width: 100%;
      max-width: 900px;
      border: {{shapes.borderWidth}} solid {{colors.outline}};
      padding: {{spacing.gutter}};
      background-color: {{colors.surface-container}};
    }
    
    .header {
      border-bottom: {{shapes.borderWidth}} solid {{colors.outline-variant}};
      padding-bottom: 16px;
      margin-bottom: {{spacing.gutter}};
    }
    
    .meta {
      font-family: {{typography.meta-technical.fontFamily}}, monospace;
      font-size: {{typography.meta-technical.fontSize}};
      font-weight: {{typography.meta-technical.fontWeight}};
      letter-spacing: {{typography.meta-technical.letterSpacing}};
      color: {{colors.on-surface-variant}};
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    
    .body-text {
      font-family: {{typography.body-lg.fontFamily}}, serif;
      font-size: {{typography.body-lg.fontSize}};
      font-weight: {{typography.body-lg.fontWeight}};
      line-height: {{typography.body-lg.lineHeight}};
      color: {{colors.on-surface}};
      white-space: pre-line;
    }
    
    .slide-number {
      font-family: {{typography.label-sm.fontFamily}}, monospace;
      font-size: {{typography.label-sm.fontSize}};
      color: {{colors.on-surface-variant}};
      text-align: right;
      margin-top: {{spacing.gutter}};
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="meta">{{slideNumber}}/{{totalSlides}}</div>
    </div>
    <div class="body-text">{{text}}</div>
    <div class="slide-number">NEWSPAPPER</div>
  </div>
</body>
</html>
