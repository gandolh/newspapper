<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@700;800&family=Manrope:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 1080px;
      height: 1080px;
      background-color: {{colors.surface}};
      background-image: 
        linear-gradient(to right, rgba(27, 28, 28, 0.05) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(27, 28, 28, 0.05) 1px, transparent 1px);
      background-size: 32px 32px;
      color: {{colors.on-surface}};
      font-family: {{typography.body-md.fontFamily}}, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-start;
      padding: 100px;
      border: 20px solid {{colors.on-surface}};
      position: relative;
    }
    
    .badge {
      position: absolute;
      top: 100px;
      left: 100px;
      font-family: {{typography.label-bold.fontFamily}}, sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: {{colors.on-primary}};
      background-color: {{colors.primary}};
      padding: 12px 24px;
      border: 4px solid {{colors.on-surface}};
      text-transform: uppercase;
      letter-spacing: 0.1em;
      box-shadow: 8px 8px 0px {{colors.on-surface}};
    }
    
    .title {
      font-family: {{typography.display.fontFamily}}, sans-serif;
      font-size: 96px;
      font-weight: 800;
      line-height: 0.95;
      color: {{colors.on-surface}};
      text-transform: uppercase;
      letter-spacing: -0.05em;
    }
    
    .accent-bars {
      position: absolute;
      bottom: 100px;
      right: 100px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .bar {
      height: 4px;
      background-color: {{colors.on-surface}};
      box-shadow: 2px 2px 0px {{colors.on-surface}};
    }
    
    .bar-long {
      width: 64px;
    }
    
    .bar-short {
      width: 32px;
    }
  </style>
</head>
<body>
  <div class="badge">Newspapper</div>
  <h1 class="title">{{text}}</h1>
  <div class="accent-bars">
    <div class="bar bar-long"></div>
    <div class="bar bar-short"></div>
  </div>
</body>
</html>
