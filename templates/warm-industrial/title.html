<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@700;800&family=Manrope:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 1080px;
      height: 1080px;
      background-color: {{colors.surface}};
      background-image: 
        repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.02) 2px, rgba(0,0,0,0.02) 4px);
      color: {{colors.on-surface}};
      font-family: {{typography.body-md.fontFamily}}, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: {{spacing.container-margin}};
    }
    
    .container {
      width: 100%;
      max-width: 900px;
      border: {{shapes.borderWidth}} solid {{colors.outline}};
      border-radius: {{shapes.borderRadius}};
      padding: {{spacing.lg}};
      background-color: {{colors.surface-container}};
      box-shadow: 4px 4px 0 {{colors.outline}};
    }
    
    .badge {
      display: inline-block;
      font-family: {{typography.label-bold.fontFamily}}, sans-serif;
      font-size: {{typography.label-bold.fontSize}};
      font-weight: {{typography.label-bold.fontWeight}};
      color: {{colors.on-primary}};
      background-color: {{colors.primary}};
      padding: 8px 16px;
      border-radius: {{shapes.borderRadius}};
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: {{spacing.md}};
    }
    
    .title {
      font-family: {{typography.headline-lg.fontFamily}}, sans-serif;
      font-size: {{typography.headline-lg.fontSize}};
      font-weight: {{typography.headline-lg.fontWeight}};
      line-height: {{typography.headline-lg.lineHeight}};
      letter-spacing: {{typography.headline-lg.letterSpacing}};
      color: {{colors.on-surface}};
    }
    
    .meta {
      font-family: {{typography.label-bold.fontFamily}}, sans-serif;
      font-size: {{typography.label-bold.fontSize}};
      font-weight: {{typography.label-bold.fontWeight}};
      color: {{colors.on-surface-variant}};
      margin-top: {{spacing.md}};
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">Newspapper</div>
    <h1 class="title">{{text}}</h1>
    <div class="meta">
      <span>News Summary</span>
      <span>{{slideNumber}}/{{totalSlides}}</span>
    </div>
  </div>
</body>
</html>
