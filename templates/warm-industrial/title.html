<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@700;800&family=Manrope:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 1080px;
      height: 1080px;
      background-color: {{colors.surface}};
      background-image: 
        repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.02) 2px, rgba(0,0,0,0.02) 4px);
      color: {{colors.on-surface}};
      font-family: {{typography.body-md.fontFamily}}, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-start;
      padding: 100px;
    }
    
    .badge {
      font-family: {{typography.label-bold.fontFamily}}, sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: {{colors.on-primary}};
      background-color: {{colors.primary}};
      padding: 12px 24px;
      border-radius: 0;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 40px;
    }
    
    .title {
      font-family: {{typography.display.fontFamily}}, sans-serif;
      font-size: 96px;
      font-weight: 800;
      line-height: 0.95;
      color: {{colors.on-surface}};
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="badge">Newspapper</div>
  <h1 class="title">{{text}}</h1>
</body>
</html>
