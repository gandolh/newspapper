<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@700;800&family=Manrope:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 1080px;
      height: 1080px;
      background-color: {{colors.surface}};
      background-image: 
        repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.02) 2px, rgba(0,0,0,0.02) 4px);
      color: {{colors.on-surface}};
      font-family: {{typography.body-md.fontFamily}}, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: {{spacing.container-margin}};
    }
    
    .container {
      width: 100%;
      max-width: 900px;
      border: {{shapes.borderWidth}} solid {{colors.outline}};
      border-radius: {{shapes.borderRadius}};
      padding: {{spacing.md}};
      background-color: {{colors.surface-container}};
      box-shadow: 4px 4px 0 {{colors.outline}};
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: {{spacing.md}};
      padding-bottom: {{spacing.sm}};
      border-bottom: 1px solid {{colors.outline-variant}};
    }
    
    .badge {
      font-family: {{typography.label-bold.fontFamily}}, sans-serif;
      font-size: 12px;
      font-weight: {{typography.label-bold.fontWeight}};
      color: {{colors.on-secondary}};
      background-color: {{colors.secondary}};
      padding: 6px 12px;
      border-radius: {{shapes.borderRadius}};
      text-transform: uppercase;
    }
    
    .slide-num {
      font-family: {{typography.label-bold.fontFamily}}, sans-serif;
      font-size: {{typography.label-bold.fontSize}};
      color: {{colors.on-surface-variant}};
    }
    
    .body-text {
      font-family: {{typography.body-lg.fontFamily}}, sans-serif;
      font-size: {{typography.body-lg.fontSize}};
      font-weight: {{typography.body-lg.fontWeight}};
      line-height: {{typography.body-lg.lineHeight}};
      color: {{colors.on-surface}};
      white-space: pre-line;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="badge">Newspapper</div>
      <div class="slide-num">{{slideNumber}}/{{totalSlides}}</div>
    </div>
    <div class="body-text">{{text}}</div>
  </div>
</body>
</html>
