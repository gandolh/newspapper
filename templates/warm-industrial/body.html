<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@700;800&family=Manrope:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 1080px;
      height: 1080px;
      background-color: {{colors.surface}};
      background-image: 
        repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.02) 2px, rgba(0,0,0,0.02) 4px);
      color: {{colors.on-surface}};
      font-family: {{typography.body-md.fontFamily}}, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: flex-start;
      padding: 120px;
    }
    
    .container {
      width: 100%;
    }
    
    .header {
      margin-bottom: 60px;
    }
    
    .badge {
      font-family: {{typography.label-bold.fontFamily}}, sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: {{colors.on-secondary}};
      background-color: {{colors.secondary}};
      padding: 8px 16px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    
    .body-text {
      font-family: {{typography.body-lg.fontFamily}}, sans-serif;
      font-size: 52px;
      font-weight: 400;
      line-height: 1.3;
      color: {{colors.on-surface}};
      white-space: pre-line;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="badge">Newspapper</div>
    </div>
    <div class="body-text">{{text}}</div>
  </div>
</body>
</html>
