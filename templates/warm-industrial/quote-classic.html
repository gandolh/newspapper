<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@700;800&family=Manrope:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 1080px;
      height: 1080px;
      background-color: {{colors.inverse-surface}};
      background-image: 
        linear-gradient(to right, rgba(27, 28, 28, 0.05) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(27, 28, 28, 0.05) 1px, transparent 1px);
      background-size: 8px 8px;
      color: {{colors.inverse-on-surface}};
      font-family: {{typography.body-md.fontFamily}}, sans-serif;
      display: flex;
      flex-direction: column;
      border: 12px solid {{colors.on-background}};
      position: relative;
    }
    
    .accent-stripe {
      width: 100%;
      height: 16px;
      background: linear-gradient(to right, 
        {{colors.surface-tint}} 0%, 
        {{colors.surface-tint}} 33%, 
        {{colors.primary}} 33%, 
        {{colors.primary}} 66%, 
        {{colors.on-primary-fixed-variant}} 66%);
      border-bottom: 4px solid {{colors.on-background}};
    }
    
    .content {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 100px;
      position: relative;
    }
    
    .quote-container {
      background-color: {{colors.surface}};
      border: 4px solid {{colors.on-background}};
      padding: 80px;
      box-shadow: 8px 8px 0px {{colors.on-background}};
      position: relative;
      text-align: center;
      max-width: 800px;
    }
    
    .badge {
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      font-family: {{typography.label-bold.fontFamily}}, sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: {{colors.on-primary}};
      background-color: {{colors.primary}};
      padding: 8px 16px;
      border: 2px solid {{colors.on-background}};
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    .quote-text {
      font-family: {{typography.headline-xl.fontFamily}}, sans-serif;
      font-size: 64px;
      font-weight: 800;
      line-height: 0.95;
      color: {{colors.on-background}};
      text-transform: uppercase;
      letter-spacing: -0.05em;
      margin-bottom: 48px;
    }
    
    .quote-text .highlight {
      color: {{colors.primary}};
    }
    
    .quote-text .inverse {
      background-color: {{colors.on-background}};
      color: {{colors.surface}};
      padding: 0 8px;
    }
    
    .attribution {
      font-family: {{typography.label-bold.fontFamily}}, sans-serif;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 0.1em;
      color: {{colors.on-surface-variant}};
      text-transform: uppercase;
      border-top: 4px solid {{colors.outline}};
      padding-top: 20px;
      display: inline-block;
    }
    
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 32px 48px;
      border-top: 12px solid {{colors.on-background}};
      background-color: {{colors.surface}};
    }
    
    .footer-text {
      font-family: {{typography.label-bold.fontFamily}}, sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: {{colors.on-background}};
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    .accent-square {
      width: 16px;
      height: 16px;
      background-color: {{colors.primary}};
      border: 2px solid {{colors.on-background}};
    }
  </style>
</head>
<body>
  <div class="accent-stripe"></div>
  <div class="content">
    <div class="quote-container">
      <div class="badge">CORE PRINCIPLE</div>
      <h1 class="quote-text">{{text}}</h1>
      <div class="attribution">{{attribution}}</div>
    </div>
  </div>
  <div class="footer">
    <span class="footer-text">Newspapper Industrial</span>
    <div class="accent-square"></div>
  </div>
</body>
</html>
