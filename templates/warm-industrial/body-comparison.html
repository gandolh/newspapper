<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@700;800&family=Manrope:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 1080px;
      height: 1080px;
      background-color: {{colors.background}};
      background-image: 
        linear-gradient(to right, rgba(27, 28, 28, 0.05) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(27, 28, 28, 0.05) 1px, transparent 1px);
      background-size: 32px 32px;
      color: {{colors.on-surface}};
      font-family: {{typography.body-md.fontFamily}}, sans-serif;
      display: flex;
      flex-direction: column;
      border: 20px solid {{colors.on-surface}};
    }
    
    .header {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 48px;
      border-bottom: 12px solid {{colors.on-surface}};
      background-color: {{colors.surface}};
    }
    
    .badge {
      font-family: {{typography.label-bold.fontFamily}}, sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: {{colors.on-surface}};
      background-color: {{colors.secondary-container}};
      padding: 12px 24px;
      border: 2px solid {{colors.on-surface}};
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    .content {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 80px;
    }
    
    .container {
      width: 100%;
      background-color: {{colors.surface-container}};
      border: 4px solid {{colors.on-surface}};
      padding: 80px;
      box-shadow: 12px 12px 0px {{colors.on-surface}};
      position: relative;
    }
    
    .container::before {
      content: '';
      position: absolute;
      top: -16px;
      right: -16px;
      bottom: 16px;
      left: 16px;
      background-color: {{colors.on-surface}};
      z-index: -1;
    }
    
    .body-text {
      font-family: {{typography.headline-md.fontFamily}}, sans-serif;
      font-size: 40px;
      font-weight: 700;
      line-height: 1.4;
      color: {{colors.on-surface}};
      white-space: pre-wrap;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="badge">NEWSPAPPER</div>
  </div>
  <div class="content">
    <div class="container">
      <div class="body-text">{{text}}</div>
    </div>
  </div>
</body>
</html>
