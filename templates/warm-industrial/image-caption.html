<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@700;800&family=Manrope:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 1080px;
      height: 1080px;
      background-color: {{colors.surface}};
      color: {{colors.on-surface}};
      font-family: {{typography.body-md.fontFamily}}, sans-serif;
      display: flex;
      padding: 60px;
    }
    
    .container {
      display: flex;
      width: 100%;
      gap: 40px;
      background-color: {{colors.surface-container}};
      padding: 40px;
      border: 4px solid {{colors.outline}};
      box-shadow: 12px 12px 0 {{colors.primary}};
    }
    
    .image-side {
      flex: 1;
      height: 100%;
      background-color: {{colors.surface-dim}};
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .image-placeholder {
      font-family: {{typography.label-bold.fontFamily}}, sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: {{colors.on-surface-variant}};
      text-transform: uppercase;
      transform: rotate(-90deg);
      white-space: nowrap;
    }
    
    .content-side {
      flex: 1.2;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 20px;
    }
    
    .badge {
      font-family: {{typography.label-bold.fontFamily}}, sans-serif;
      font-size: 14px;
      font-weight: 800;
      color: {{colors.on-primary}};
      background-color: {{colors.primary}};
      padding: 6px 12px;
      display: inline-block;
      margin-bottom: 30px;
      align-self: flex-start;
    }
    
    .caption-text {
      font-family: {{typography.body-lg.fontFamily}}, sans-serif;
      font-size: 34px;
      font-weight: 500;
      line-height: 1.3;
      color: {{colors.on-surface}};
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="image-side">
      <div class="image-placeholder">CONTENT IMAGE</div>
    </div>
    <div class="content-side">
      <div class="badge">News Insight</div>
      <div class="caption-text">{{text}}</div>
    </div>
  </div>
</body>
</html>
