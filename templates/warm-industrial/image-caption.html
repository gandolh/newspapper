<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@700;800&family=Manrope:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 1080px;
      height: 1080px;
      background-color: {{colors.surface}};
      background-image: 
        repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.02) 2px, rgba(0,0,0,0.02) 4px);
      color: {{colors.on-surface}};
      font-family: {{typography.body-md.fontFamily}}, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: {{spacing.container-margin}};
    }
    
    .container {
      width: 100%;
      max-width: 900px;
      border: {{shapes.borderWidth}} solid {{colors.outline}};
      border-radius: {{shapes.borderRadius}};
      background-color: {{colors.surface-container}};
      overflow: hidden;
      box-shadow: 4px 4px 0 {{colors.outline}};
    }
    
    .image-container {
      width: 100%;
      height: 600px;
      background-color: {{colors.surface-dim}};
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .image-placeholder {
      font-family: {{typography.label-bold.fontFamily}}, sans-serif;
      font-size: 24px;
      font-weight: {{typography.label-bold.fontWeight}};
      color: {{colors.on-surface-variant}};
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    
    .caption {
      padding: {{spacing.md}};
    }
    
    .caption-text {
      font-family: {{typography.body-md.fontFamily}}, sans-serif;
      font-size: {{typography.body-md.fontSize}};
      line-height: {{typography.body-md.lineHeight}};
      color: {{colors.on-surface}};
      margin-bottom: {{spacing.sm}};
    }
    
    .meta {
      font-family: {{typography.label-bold.fontFamily}}, sans-serif;
      font-size: {{typography.label-bold.fontSize}};
      color: {{colors.on-surface-variant}};
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="image-container">
      <div class="image-placeholder">[IMAGE]</div>
    </div>
    <div class="caption">
      <div class="caption-text">{{text}}</div>
      <div class="meta">
        <span>NEWSPAPPER</span>
        <span>{{slideNumber}}/{{totalSlides}}</span>
      </div>
    </div>
  </div>
</body>
</html>
