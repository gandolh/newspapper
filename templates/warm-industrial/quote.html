<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@700;800&family=Manrope:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 1080px;
      height: 1080px;
      background-color: {{colors.primary}};
      color: {{colors.on-primary}};
      font-family: {{typography.body-md.fontFamily}}, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 120px;
    }
    
    .container {
      width: 100%;
      position: relative;
    }
    
    .quote-mark {
      font-family: {{typography.display.fontFamily}}, sans-serif;
      font-size: 240px;
      font-weight: 800;
      color: {{colors.surface}};
      line-height: 1;
      position: absolute;
      top: -120px;
      left: -40px;
      opacity: 0.15;
    }
    
    .quote-text {
      font-family: {{typography.headline-lg.fontFamily}}, sans-serif;
      font-size: 64px;
      font-weight: 800;
      line-height: 1.1;
      color: {{colors.on-primary}};
      margin-bottom: 60px;
      position: relative;
      z-index: 1;
    }
    
    .attribution {
      font-family: {{typography.label-bold.fontFamily}}, sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: {{colors.primary}};
      background-color: {{colors.surface}};
      padding: 12px 24px;
      border-radius: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: inline-block;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="quote-mark">“</div>
    <div class="quote-text">{{text}}</div>
    <div class="attribution">— {{attribution}}</div>
  </div>
</body>
</html>
